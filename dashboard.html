<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <title>Dashboard NOC | New Generation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="dash-style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-box">New<span>Gen</span></div>

            <table>
                <thead>
                    <tr>
                        <th>Data</th>

                        <th>Contacto</th>
